<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Illustrata · UI Review</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --navy:#284064; --navy2:#3C5679; --blue:#306EC6;
    --paper:#F5F7F9; --card:#FFFFFF; --header:#EDEFF2;
    --line:#E4E8EE; --line2:#D3D9E2; --muted:#6B7686; --muted-ink:#9AA3B2;
    --gold:#FEC000; --gold-soft:#FBEFC9; --pin:#E8372E; --good:#2E9E5B;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  html,body{font-family:'Montserrat',system-ui,sans-serif;background:var(--paper);color:var(--navy);line-height:1.45;-webkit-font-smoothing:antialiased;min-height:100%;}
  button{font-family:inherit;cursor:pointer;}
  a{color:var(--blue);}

  /* Header */
  .app-header{background:var(--header);padding:16px 26px;}
  .app-header .inner{max-width:1280px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;}
  .brand{display:flex;align-items:center;gap:15px;}
  .brand .divider{border-left:1px solid var(--line2);padding-left:15px;}
  .brand .eyebrow{font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--blue);}
  .brand .title{font-size:17px;font-weight:700;color:var(--navy);letter-spacing:-.01em;}
  .whoami{font-size:12.5px;color:var(--muted);}
  .whoami b{color:var(--navy);font-weight:600;}
  .whoami button{background:none;border:none;color:var(--blue);font-size:12px;font-weight:600;padding:0 0 0 8px;}
  .gradient-bar{height:3px;background:linear-gradient(90deg,var(--navy),var(--blue));}

  /* Buttons */
  .btn{display:inline-flex;align-items:center;gap:7px;background:var(--navy);color:#fff;border:none;border-radius:9px;padding:9px 15px;font-size:13px;font-weight:600;transition:background .12s;}
  .btn:hover{background:var(--blue);}
  .btn.small{padding:6px 11px;font-size:12px;border-radius:8px;}
  .btn-outline{background:#fff;color:var(--navy);border:1px solid var(--line2);}
  .btn-outline:hover{background:var(--paper);border-color:var(--navy2);}
  .btn-ghost{background:none;border:none;color:var(--muted);font-size:12px;font-weight:600;padding:4px 6px;border-radius:6px;}
  .btn-ghost:hover{background:var(--paper);color:var(--navy);}

  /* Generic layout */
  .wrap{max-width:1280px;margin:0 auto;padding:26px;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;}
  .eyebrow{font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--muted-ink);}

  /* Setup screen */
  .setup{max-width:640px;margin:60px auto;padding:0 26px;}
  .setup .card{padding:28px 30px;}
  .setup h2{font-size:20px;font-weight:700;margin-bottom:8px;}
  .setup p{font-size:13.5px;color:var(--muted);line-height:1.6;margin-bottom:14px;}
  .setup code{background:var(--paper);border:1px solid var(--line);border-radius:5px;padding:2px 6px;font-size:12.5px;color:var(--navy);}
  .setup ol{margin:0 0 4px 18px;font-size:13.5px;color:var(--muted);line-height:1.9;}

  /* Dashboard */
  .dash-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;gap:12px;flex-wrap:wrap;}
  .dash-head h1{font-size:22px;font-weight:700;letter-spacing:-.01em;}
  .ui-list{display:flex;flex-direction:column;gap:12px;}
  .ui-row{display:flex;align-items:center;gap:18px;padding:16px 18px;}
  .ui-row .main{flex:1;min-width:0;}
  .ui-row .ui-title{font-size:15px;font-weight:700;color:var(--navy);margin-bottom:3px;}
  .ui-row .ui-meta{font-size:12px;color:var(--muted);display:flex;gap:14px;flex-wrap:wrap;}
  .ui-row .ui-meta .dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:5px;vertical-align:middle;}
  .badge{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:2px 7px;border-radius:5px;background:var(--paper);color:var(--muted);border:1px solid var(--line);}
  .badge.open{background:#FFF3E0;color:#B4690E;border-color:#F3D9A8;}
  .badge.done{background:#EAF6EE;color:var(--good);border-color:#BFE6CC;}
  .ui-row .actions{display:flex;gap:8px;align-items:center;flex-shrink:0;flex-wrap:wrap;}
  .dash-actions{display:flex;gap:10px;}
  .group{margin-bottom:22px;}
  .group-head{display:flex;align-items:center;gap:10px;padding:6px 4px;cursor:pointer;user-select:none;border-bottom:1px solid var(--line);margin-bottom:12px;}
  .group-head .caret{font-size:11px;color:var(--muted);transition:transform .15s;display:inline-block;}
  .group:not(.collapsed) .group-head .caret{transform:rotate(90deg);}
  .group-name{font-size:13px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--navy);}
  .group-count{font-size:11px;font-weight:600;color:var(--muted);background:var(--paper);border:1px solid var(--line);border-radius:20px;padding:1px 9px;}
  .group-tools{margin-left:auto;display:flex;gap:2px;}
  .group.collapsed .group-body{display:none;}
  .group-body{display:flex;flex-direction:column;gap:12px;}
  .group-empty{font-size:12px;color:var(--muted-ink);padding:8px 4px;}
  .group-select{border:1px solid var(--line2);border-radius:8px;padding:6px 8px;font-family:inherit;font-size:12px;font-weight:600;color:var(--navy);background:#fff;max-width:160px;}
  .actions .del{color:var(--muted);font-size:15px;line-height:1;padding:6px 9px;border:1px solid var(--line2);border-radius:8px;background:#fff;}
  .actions .del:hover{color:var(--pin);border-color:#F3C9C6;background:#FCEBEA;}
  .empty{padding:48px 20px;text-align:center;color:var(--muted);}
  .empty .big{font-size:15px;font-weight:600;color:var(--navy);margin-bottom:6px;}

  /* Modal */
  .modal-back{position:fixed;inset:0;background:rgba(40,64,100,.4);display:flex;align-items:flex-start;justify-content:center;padding:40px 20px;z-index:100;overflow:auto;}
  .modal{background:#fff;border-radius:16px;width:100%;max-width:560px;padding:24px 26px;box-shadow:0 12px 40px rgba(0,0,0,.25);}
  .modal h3{font-size:17px;font-weight:700;margin-bottom:4px;}
  .modal .sub{font-size:12.5px;color:var(--muted);margin-bottom:16px;}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:12px;font-weight:600;color:var(--navy);margin-bottom:6px;}
  .field input[type=text],.field textarea{width:100%;border:1px solid var(--line2);border-radius:9px;padding:10px 12px;font-family:inherit;font-size:13px;color:var(--navy);background:var(--paper);}
  .field textarea{min-height:150px;resize:vertical;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12px;line-height:1.5;}
  .field input:focus,.field textarea:focus{outline:none;border-color:var(--blue);background:#fff;}
  .dropzone{border:2px dashed var(--line2);border-radius:10px;padding:14px;text-align:center;font-size:12px;color:var(--muted);background:var(--paper);margin-bottom:8px;transition:.12s;}
  .dropzone.hot{border-color:var(--blue);background:#EFF5FD;color:var(--navy);}
  .radio-row{display:flex;gap:16px;}
  .radio-row label{display:flex;align-items:center;gap:6px;font-size:12.5px;font-weight:500;color:var(--muted);cursor:pointer;}
  .radio-row input{accent-color:var(--blue);}
  .check-row{display:flex;align-items:center;gap:8px;font-size:12.5px;font-weight:600;color:var(--navy);cursor:pointer;}
  .check-row input{accent-color:var(--blue);width:15px;height:15px;cursor:pointer;}
  .modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:18px;}

  /* Lock control on dashboard rows */
  .actions .lock-btn{font-size:15px;line-height:1;padding:6px 9px;border:1px solid var(--line2);border-radius:8px;background:#fff;}
  .actions .lock-btn.on{border-color:var(--gold);background:var(--gold-soft);}
  .actions .lock-btn:hover{border-color:var(--navy2);}

  /* Password gate (reviewer) */
  .gate{max-width:440px;margin:70px auto;padding:0 26px;}
  .gate-card{padding:34px 32px;text-align:center;}
  .gate-lock{font-size:34px;margin-bottom:12px;}
  .gate-card h2{font-size:20px;font-weight:700;margin:6px 0 8px;color:var(--navy);}
  .gate-card p{font-size:13px;color:var(--muted);margin-bottom:18px;line-height:1.6;}
  .gate-card input[type=password],.gate-card input[type=text]{width:100%;border:1px solid var(--line2);border-radius:9px;padding:11px 13px;font-family:inherit;font-size:14px;color:var(--navy);background:var(--paper);text-align:center;}
  .gate-card input:focus{outline:none;border-color:var(--blue);background:#fff;}

  /* Dashboard users (Manage access) */
  .user-row{display:flex;align-items:center;gap:10px;padding:9px 4px;border-bottom:1px solid var(--line);}
  .user-name{font-size:13px;font-weight:600;color:var(--navy);flex:1;min-width:0;word-break:break-all;}
  .user-tools{display:flex;gap:4px;flex-shrink:0;}
  .cred-box{background:var(--gold-soft);border:1px solid #F3D9A8;border-radius:10px;padding:12px 14px;margin-bottom:14px;}
  .cred-title{font-size:12.5px;font-weight:600;color:var(--navy);margin-bottom:8px;}
  .cred-pre{background:#fff;border:1px solid var(--line);border-radius:7px;padding:9px 11px;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12px;color:var(--navy);white-space:pre-wrap;word-break:break-all;margin-bottom:9px;}
  .gate-err{display:none;color:var(--pin);font-size:12.5px;font-weight:600;margin-top:10px;}
  .gate-err.show{display:block;}
  .gate-btn{width:100%;justify-content:center;margin-top:16px;padding:11px;}

  /* Screenshot attachments */
  .att-strip{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;}
  .att-thumb{position:relative;width:72px;height:72px;border-radius:8px;overflow:hidden;border:1px solid var(--line2);background:var(--paper);display:flex;align-items:center;justify-content:center;}
  .att-thumb img{width:100%;height:100%;object-fit:cover;display:block;}
  .att-thumb .att-x{position:absolute;top:2px;right:2px;width:18px;height:18px;border:none;border-radius:50%;background:rgba(40,64,100,.85);color:#fff;font-size:13px;line-height:1;display:flex;align-items:center;justify-content:center;cursor:pointer;padding:0;}
  .att-spin{width:18px;height:18px;border:2px solid var(--line2);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .att-add{color:var(--blue);}
  .composer.drop-hot textarea{border-color:var(--blue);background:#EFF5FD;}
  .cmt-imgs{display:flex;flex-wrap:wrap;gap:7px;margin-top:8px;}
  .cmt-img{width:84px;height:84px;object-fit:cover;border-radius:8px;border:1px solid var(--line2);cursor:zoom-in;transition:border-color .12s;}
  .cmt-img:hover{border-color:var(--blue);}
  .lightbox{position:fixed;inset:0;background:rgba(20,30,48,.86);display:flex;align-items:center;justify-content:center;z-index:300;padding:30px;cursor:zoom-out;}
  .lightbox img{max-width:96%;max-height:96%;border-radius:10px;box-shadow:0 12px 50px rgba(0,0,0,.5);}
  .lightbox .lb-x{position:fixed;top:18px;right:22px;width:38px;height:38px;border:none;border-radius:50%;background:rgba(255,255,255,.15);color:#fff;font-size:22px;cursor:pointer;}

  /* Review layout */
  .review{display:flex;height:calc(100vh - 74px);}
  .canvas-col{flex:1;min-width:0;overflow:auto;background:#DfE4EA;padding:22px;}
  .review-topbar{max-width:1220px;margin:0 auto 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
  .export-btn{margin-left:auto;}
  .review-topbar .r-title{font-size:15px;font-weight:700;color:var(--navy);}
  .verselect{border:1px solid var(--line2);border-radius:8px;padding:6px 10px;font-family:inherit;font-size:12.5px;font-weight:600;color:var(--navy);background:#fff;}
  .pin-toggle{width:100%;justify-content:center;font-size:13px;}
  .pin-toggle.on{background:var(--pin);}
  .pin-toggle.on:hover{background:#c22c24;}
  .pin-help{max-width:1220px;margin:0 auto 12px;font-size:12px;color:var(--navy2);}
  .pin-help b{color:var(--navy);font-weight:700;}
  .side-foot{border-top:1px solid var(--line);padding:12px 14px;background:#fff;}
  .pin-banner{display:none;margin:0 0 9px;background:var(--pin);color:#fff;font-size:12px;font-weight:600;padding:8px 12px;border-radius:8px;text-align:center;}
  .pin-banner.show{display:block;}
  @keyframes pinpulse{0%{transform:translate(-50%,-50%) scale(1);}50%{transform:translate(-50%,-50%) scale(1.5);}100%{transform:translate(-50%,-50%) scale(1);}}
  .pin.pulse{animation:pinpulse .55s ease 2;}
  .hint{font-size:11.5px;color:var(--navy2);background:#fff;border:1px solid var(--line);border-radius:7px;padding:5px 10px;}

  .browser{max-width:1220px;margin:0 auto;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 6px 28px rgba(40,64,100,.16);}
  .chrome{background:var(--navy);padding:9px 14px;display:flex;align-items:center;gap:8px;}
  .chrome .dots{display:flex;gap:6px;}
  .chrome .dots i{width:11px;height:11px;border-radius:50%;display:block;}
  .chrome .url{flex:1;background:rgba(255,255,255,.12);border-radius:6px;padding:4px 12px;font-size:11.5px;color:rgba(255,255,255,.75);text-align:center;}
  .stage{position:relative;}
  #ui-frame{display:block;width:100%;border:0;background:#fff;}
  #overlay{position:absolute;inset:0;pointer-events:none;}
  #overlay.arming{pointer-events:auto;cursor:crosshair;}
  .pin{position:absolute;transform:translate(-50%,-50%);width:26px;height:26px;border-radius:50% 50% 50% 2px;background:var(--pin);color:#fff;border:2.5px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;pointer-events:auto;cursor:pointer;transition:transform .12s;}
  .pin:hover,.pin.active{transform:translate(-50%,-50%) scale(1.18);}
  .pin.resolved{background:var(--good);}
  .pin.stale{opacity:.45;border-style:dashed;}
  .sel-btn{position:absolute;transform:translate(-50%,-115%);background:var(--navy);color:#fff;border:none;border-radius:7px;padding:6px 11px;font-size:11.5px;font-weight:600;pointer-events:auto;box-shadow:0 3px 10px rgba(0,0,0,.28);white-space:nowrap;z-index:20;}
  .sel-btn::after{content:"";position:absolute;left:50%;bottom:-5px;transform:translateX(-50%);border:5px solid transparent;border-top-color:var(--navy);}

  /* Comments sidebar */
  .side{width:var(--side-w,390px);flex-shrink:0;background:#fff;border-left:1px solid var(--line);display:flex;flex-direction:column;height:100%;}
  .side-resizer{flex:0 0 7px;align-self:stretch;cursor:col-resize;background:transparent;position:relative;}
  .side-resizer::before{content:"";position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:3px;height:34px;border-radius:3px;background:var(--line2);opacity:0;transition:opacity .12s;}
  .side-resizer:hover,.side-resizer.dragging{background:var(--paper);}
  .side-resizer:hover::before,.side-resizer.dragging::before{opacity:1;}
  .side-head{padding:16px 18px;border-bottom:1px solid var(--line);}
  .side-head .st{font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;}
  .filters{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
  .chip{border:1px solid var(--line2);background:#fff;border-radius:20px;padding:4px 11px;font-size:11.5px;font-weight:600;color:var(--muted);}
  .chip.on{background:var(--navy);color:#fff;border-color:var(--navy);}
  .filters select{margin-left:auto;border:1px solid var(--line2);border-radius:8px;padding:4px 8px;font-family:inherit;font-size:11.5px;color:var(--navy);background:#fff;}
  .comments{flex:1;overflow:auto;padding:12px 14px;display:flex;flex-direction:column;gap:10px;}
  .cmt{border:1px solid var(--line);border-radius:11px;padding:11px 13px;background:#fff;transition:border-color .12s,box-shadow .12s;}
  .cmt.active{border-color:var(--blue);box-shadow:0 0 0 3px rgba(48,110,198,.12);}
  .cmt.resolved{background:#F7FBF8;}
  .cmt-top{display:flex;align-items:center;gap:9px;margin-bottom:7px;}
  .cmt-num{width:21px;height:21px;border-radius:50%;background:var(--pin);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .cmt.resolved .cmt-num{background:var(--good);}
  .cmt-who{font-size:12.5px;font-weight:700;color:var(--navy);}
  .cmt-time{font-size:10.5px;color:var(--muted-ink);}
  .cmt-check{margin-left:auto;display:flex;align-items:center;gap:5px;font-size:11px;font-weight:600;color:var(--muted);cursor:pointer;user-select:none;}
  .cmt-check input{accent-color:var(--good);width:15px;height:15px;cursor:pointer;}
  .cmt-quote{font-size:11.5px;color:var(--navy2);background:var(--paper);border-left:2px solid var(--line2);padding:5px 9px;border-radius:0 6px 6px 0;margin-bottom:7px;font-style:italic;}
  .cmt-body{font-size:13px;color:var(--navy);line-height:1.55;white-space:pre-wrap;word-wrap:break-word;}
  .cmt-tools{display:flex;gap:10px;margin-top:8px;}
  .cmt-tools button{background:none;border:none;font-size:11.5px;font-weight:600;color:var(--muted);padding:0;}
  .cmt-tools button:hover{color:var(--blue);}
  .replies{margin-top:9px;padding-top:9px;border-top:1px dashed var(--line);display:flex;flex-direction:column;gap:9px;}
  .reply{padding-left:10px;border-left:2px solid var(--line2);}
  .reply .cmt-who{font-size:12px;}
  .reply .cmt-body{font-size:12.5px;}
  .composer textarea{width:100%;border:1px solid var(--line2);border-radius:9px;padding:9px 11px;font-family:inherit;font-size:12.5px;color:var(--navy);background:var(--paper);resize:vertical;min-height:60px;}
  .composer textarea:focus{outline:none;border-color:var(--blue);background:#fff;}
  .composer .row{display:flex;gap:8px;margin-top:8px;align-items:center;}
  .composer input[type=text]{flex:1;border:1px solid var(--line2);border-radius:8px;padding:7px 10px;font-family:inherit;font-size:12.5px;color:var(--navy);}
  .reply-open{font-size:11.5px;font-weight:600;color:var(--blue);background:none;border:none;padding:0;margin-top:8px;}
  .side-empty{text-align:center;color:var(--muted);font-size:12.5px;padding:30px 16px;line-height:1.6;}

  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:11px 18px;border-radius:10px;font-size:13px;font-weight:600;box-shadow:0 6px 20px rgba(0,0,0,.3);z-index:200;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-4px);}

  @media(max-width:820px){
    .review{flex-direction:column;height:auto;}
    .side{width:100%;border-left:none;border-top:1px solid var(--line);height:auto;}
    .side-resizer{display:none;}
    .canvas-col{height:auto;}
  }
</style>
</head>
<body>

<div class="app-header">
  <div class="inner">
    <div class="brand">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 214.09 37.42" height="24" aria-label="Illustrata">
        <defs><style>.c2{fill:#284064}.c3{fill:#567bb0}</style></defs>

        <polygon class="c3" points="14.93 33.95 31.16 33.95 31.16 28.19 20.96 28.19 14.93 28.89 14.93 33.95"/>
        <polygon class="c2" points="20.95 3.18 14.93 3.18 14.93 28.89 20.96 28.19 20.95 28.19 20.95 3.18"/>

        <polygon class="c3" points="34.74 33.95 50.98 33.95 50.98 28.19 40.76 28.19 40.76 25.91 34.74 26.6 34.74 33.95"/>
        <path class="c3" d="M68.74,24c0,3.4-2.09,4.67-4.32,4.67-2.36,0-4.28-1.27-4.28-4.67v-.32l-6,.69c.25,6.24,4.39,10.02,10.28,10.02s10.34-4.06,10.34-10.61v-1.79l-6.02.69v1.31h0Z"/>

/* ---------- optional per-UI password protection ----------
   NOTE: this is a LIGHT gate to deter casual/accidental access, NOT real
   security. The hash comparison runs entirely client-side (see sha256Hex), so
   anyone who reads this file's source could bypass it. Don't use it to protect
   anything sensitive — the UI source still lives in the database either way. */
async function sha256Hex(str){
  const buf=await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('');
}
function randSalt(){
  const a=new Uint8Array(16); crypto.getRandomValues(a);
  return [...a].map(b=>b.toString(16).padStart(2,'0')).join('');
}
function pwKey(uiId){ return 'uireview_pw_'+uiId; }
// Unlocked only if this device's stored hash still matches the current one — so
// changing or removing the password automatically re-locks every device.
function isUnlocked(ui){ return !!ui.password_hash && localStorage.getItem(pwKey(ui.id))===ui.password_hash; }
function markUnlocked(ui){ localStorage.setItem(pwKey(ui.id), ui.password_hash); }
function lockErr(e){
  const m=e.message||String(e);
  if(/column .*(is_protected|password_hash|password_salt).* does not exist|schema cache/i.test(m))
    return 'Password columns need a quick database update first — run the password SQL, then reload.';
  return 'Error: '+m;
}

  try{ sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY); }
  catch(e){ renderSetup(); return; }

}

/* ============================================================================
   DASHBOARD SIGN-IN  (light client-side gate — see the password-protection note;
   this manages who can conveniently open the dashboard, not a hard security
   boundary. Accounts live in the dashboard_users table, passwords stored hashed.)

function adminSession(){ try{ return JSON.parse(localStorage.getItem('uireview_admin')||'null'); }catch(e){ return null; } }
function setAdminSession(u){ localStorage.setItem('uireview_admin', JSON.stringify({username:u.username, hash:u.password_hash})); }
function clearAdminSession(){ localStorage.removeItem('uireview_admin'); }
function logoutAdmin(){ clearAdminSession(); CURRENT.admin=null; requireAdmin(); }

function usersErr(e){
  const m=(e&&e.message)||String(e);
  if(/relation .*dashboard_users.* does not exist|schema cache/i.test(m)) return 'Dashboard accounts need a quick database update first — run the users SQL, then reload.';
  if(/duplicate key|unique/i.test(m)) return 'That username is already taken.';
  return 'Error: '+m;
}
// Avoids look-alike characters so pasted passwords are easy to read.
function genPassword(){
  const cs='abcdefghjkmnpqrstuvwxyzABCDEFGHJKMNPQRSTUVWXYZ23456789';
  const a=new Uint8Array(14); crypto.getRandomValues(a);
  return [...a].map(b=>cs[b%cs.length]).join('');
}
function credText(username,pw){ return `Illustrata UI Review — dashboard access\nURL: ${location.origin+location.pathname}\nUsername: ${username}\nPassword: ${pw}`; }
function copyCreds(username,pw){ const t=credText(username,pw); navigator.clipboard.writeText(t).then(()=>toast('Credentials copied')).catch(()=>prompt('Copy these credentials:',t)); }

// Decide what the dashboard route shows: setup-needed, first-account, sign-in, or the dashboard.
async function requireAdmin(){
  ROOT.innerHTML = `<div class="wrap"><div class="empty">Loading…</div></div>`;
  const res=await sb.from('dashboard_users').select('*');
  if(res.error){ renderUsersSetupNeeded(res.error); return; }
  const users=res.data||[];
  if(!users.length){ renderFirstAdmin(); return; }
  const s=adminSession();
  if(s){
    const me=users.find(u=>u.username===s.username && u.password_hash===s.hash);
    if(me){ CURRENT.admin=me; renderDashboard(); return; }   // valid session (re-locks if pw changed)
  }
  renderLogin();
}

/* ---------- Manage access (add / reset / delete dashboard users) ---------- */
function showCred(back, username, pw){
  const box=back.querySelector('#cred-result'); if(!box) return;

}
async function loadUserList(back){
  const box=back.querySelector('#user-list'); if(!box) return;
  const res=await sb.from('dashboard_users').select('*').order('created_at',{ascending:true});
  if(res.error){ box.innerHTML=`<div class="group-empty">${esc(usersErr(res.error))}</div>`; return; }
  const me=CURRENT.admin;
  box.innerHTML=(res.data||[]).map(u=>`
    <div class="user-row" data-id="${u.id}" data-name="${esc(u.username)}">
      <span class="user-name">${esc(u.username)}${me&&me.id===u.id?' <span class="badge">you</span>':''}</span>
      <span class="user-tools">
        <button class="btn-ghost" data-act="reset">Reset password</button>
        <button class="btn-ghost" data-act="del">Delete</button>
      </span>
    </div>`).join('')||`<div class="group-empty">No users yet.</div>`;
  box.querySelectorAll('.user-row').forEach(row=>{
    const id=row.getAttribute('data-id'), name=row.getAttribute('data-name');
    row.querySelector('[data-act=reset]').onclick=async()=>{
      const pw=genPassword(), salt=randSalt();
      const up=await sb.from('dashboard_users').update({password_salt:salt, password_hash:await sha256Hex(salt+pw)}).eq('id',id).select().single();
      if(up.error){ toast(usersErr(up.error)); return; }
      if(me && me.id===id){ CURRENT.admin=up.data; setAdminSession(up.data); }   // keep myself signed in
      showCred(back, name, pw); toast('Password reset');
    };
    row.querySelector('[data-act=del]').onclick=async()=>{
      if(me && me.id===id){ toast("You can't delete the account you're signed in as."); return; }
      if(!confirm('Remove dashboard access for "'+name+'"?')) return;

      if(del.error){ toast(usersErr(del.error)); return; }
      toast('User removed'); loadUserList(back);
    };
  });
}

/* ============================================================================

let DASH = { uis:[], groups:[], vByUI:{}, cAgg:{} };

async function renderDashboard(){
  CURRENT.view='dashboard'; cleanupChannel();
  $('#hdr-title').textContent='UI Review'; renderWhoami();
  ROOT.innerHTML = `
    <div class="wrap">
      <div class="dash-head">
        <h1>UIs out for review</h1>
        <div class="dash-actions">
          <button class="btn-outline btn" onclick="openUsersModal()">Manage access</button>
          <button class="btn-outline btn" onclick="openNewGroup()">+ New group</button>
          <button class="btn" onclick="openAddUI()">+ Add a UI</button>
        </div>
      </div>
      <div id="ui-list" class="ui-list"><div class="empty">Loading…</div></div>
    </div>`;

  const [uis, versions, comments, groups] = await Promise.all([
    sb.from('uis').select('*').order('created_at',{ascending:false}),
    sb.from('versions').select('id,ui_id,version_number,created_at'),
    sb.from('comments').select('id,version_id,done,parent_id'),
    sb.from('groups').select('*').order('created_at',{ascending:true})
  ]);
  if(uis.error){ $('#ui-list').innerHTML=`<div class="empty"><div class="big">Couldn't load</div>${esc(uis.error.message)}<br><br>Check that the tables exist and your keys are correct.</div>`; return; }

  const vByUI={}; (versions.data||[]).forEach(v=>{ (vByUI[v.ui_id]=vByUI[v.ui_id]||[]).push(v); });
  const vIds={}; (versions.data||[]).forEach(v=>vIds[v.id]=v.ui_id);
  const cAgg={}; (comments.data||[]).forEach(c=>{
    if(c.parent_id) return;
    const uid=vIds[c.version_id]; if(!uid) return;
    const a=cAgg[uid]=cAgg[uid]||{total:0,open:0};
    a.total++; if(!c.done) a.open++;
  });

  DASH = { uis:uis.data, groups:(groups.error?[]:(groups.data||[])), vByUI, cAgg };

  if(!uis.data.length){ $('#ui-list').innerHTML=`<div class="empty"><div class="big">Nothing here yet</div>Add a UI to start collecting review comments.</div>`; return; }
  renderGroupedList();
}

function findUI(id){ return (DASH.uis||[]).find(u=>u.id===id); }
function findGroup(id){ return (DASH.groups||[]).find(g=>g.id===id); }

function getCollapsed(){ try{ return JSON.parse(localStorage.getItem('uireview_collapsed')||'[]'); }catch(e){ return []; } }
function toggleGroup(key){
  const arr=getCollapsed(); const i=arr.indexOf(key);
  if(i>=0) arr.splice(i,1); else arr.push(key);
  localStorage.setItem('uireview_collapsed', JSON.stringify(arr));
  const sec=document.querySelector('.group[data-key="'+CSS.escape(key)+'"]');
  if(sec) sec.classList.toggle('collapsed');
}

function renderGroupedList(){
  const {uis,groups}=DASH;
  const collapsed=getCollapsed();
  const byGroup={}, ungrouped=[];
  uis.forEach(u=>{ if(u.group_id && groups.some(g=>g.id===u.group_id)) (byGroup[u.group_id]=byGroup[u.group_id]||[]).push(u); else ungrouped.push(u); });
  let html='';
  if(ungrouped.length) html+=sectionHTML('__ungrouped','Ungrouped',ungrouped,collapsed,false);
  groups.forEach(g=>{ html+=sectionHTML(g.id,g.name,byGroup[g.id]||[],collapsed,true); });
  $('#ui-list').innerHTML = html || `<div class="empty">Nothing to show.</div>`;
}

function sectionHTML(key,name,arr,collapsed,isGroup){
  const isCol=collapsed.includes(key);
  const rows = arr.length ? arr.map(rowHTML).join('') : `<div class="group-empty">No UIs here yet — assign one with its group dropdown.</div>`;
  return `<div class="group ${isCol?'collapsed':''}" data-key="${esc(key)}">

async function deleteGroup(gid){

async function moveUI(uiId, val){

    const name=prompt('New group name:');

    const ins=await sb.from('groups').insert({name:name.trim()}).select().single();
    if(ins.error){ toast(groupErr(ins.error)); renderDashboard(); return; }

  }

async function deleteUI(uiId){

  if(del.error){ toast('Error: '+del.error.message); return; }
  toast('UI deleted'); renderDashboard();
}
function groupErr(e){
  const m=e.message||String(e);
  if(/relation .*groups.* does not exist|column .*group_id.* does not exist|schema cache/i.test(m))
    return 'Groups need a quick database update first — run the groups SQL, then reload.';
  return 'Error: '+m;
}

/* ---------- Add UI / Add version modals ---------- */
function detectType(src){
  const s=src.trim();
  if(/export\s+default/.test(s) || /from\s*['"]react['"]/.test(s) || /import\s+React/.test(s)) return 'jsx';
  if(/^<!doctype/i.test(s) || /^<html[\s>]/i.test(s)) return 'html';
  if(/useState\s*\(|useEffect\s*\(/.test(s)) return 'jsx';
  return 'html';
}

function modalShell(inner){
  const back=document.createElement('div'); back.className='modal-back';
  back.innerHTML=`<div class="modal">${inner}</div>`;
  back.addEventListener('mousedown',e=>{ if(e.target===back) back.remove(); });
  document.body.appendChild(back); return back;
}

function sourceFormHTML(kind){
  return `
    <div class="field">
      <label>Title</label>
      <input type="text" id="f-title" placeholder="e.g. Prosperity agent portal — landing" />
    </div>
    <div class="field">
      <label>UI source</label>
      <div class="dropzone" id="dz">Drag an <b>.html</b> or <b>.jsx</b> file here, or paste below</div>
      <textarea id="f-src" placeholder="Paste HTML or JSX (React) source here…"></textarea>
    </div>
    <div class="field">
      <label>How should it render?</label>
      <div class="radio-row">
        <label><input type="radio" name="rtype" value="auto" checked> Auto-detect</label>
        <label><input type="radio" name="rtype" value="html"> HTML</label>
        <label><input type="radio" name="rtype" value="jsx"> JSX / React</label>
      </div>
    </div>`;
}

function wireDropzone(back){
  const dz=back.querySelector('#dz'), ta=back.querySelector('#f-src');
  ['dragenter','dragover'].forEach(ev=>dz.addEventListener(ev,e=>{e.preventDefault();dz.classList.add('hot');}));
  ['dragleave','drop'].forEach(ev=>dz.addEventListener(ev,e=>{e.preventDefault();dz.classList.remove('hot');}));
  dz.addEventListener('drop',e=>{
    const f=e.dataTransfer.files[0]; if(!f) return;
    const rd=new FileReader();
    rd.onload=()=>{ ta.value=rd.result;
      const t=/\.jsx?$/i.test(f.name)&&/\.jsx$/i.test(f.name)?'jsx':detectType(rd.result);
      const radio=back.querySelector(`input[name=rtype][value=${t}]`); if(radio) radio.checked=true;
      if(!back.querySelector('#f-title').value) back.querySelector('#f-title').value=f.name.replace(/\.[^.]+$/,'');
    };
    rd.readAsText(f);
  });
}
function chosenType(back, src){
  const v=back.querySelector('input[name=rtype]:checked').value;
  return v==='auto'?detectType(src):v;
}

async function drawVersionList(back, uiId){
  const box=back.querySelector('#ver-list'); if(!box) return;
  const vs=(DASH.vByUI[uiId]||[]).slice().sort((a,b)=>b.version_number-a.version_number);
  const maxNum = vs.length ? Math.max.apply(null, vs.map(v=>v.version_number)) : 0;
  // per-version top-level comment counts
  const counts={}; const vids=vs.map(v=>v.id);
  if(vids.length){
    const c=await sb.from('comments').select('version_id,parent_id').in('version_id',vids);
    (c.data||[]).forEach(x=>{ if(x.parent_id) return; counts[x.version_id]=(counts[x.version_id]||0)+1; });
  }
  box.innerHTML = vs.length ? vs.map(v=>{
    const n=counts[v.id]||0;
    return `<div class="user-row">
      <span class="user-name">Version ${v.version_number}${v.version_number===maxNum?' <span class="badge open">latest · on link</span>':''}
        <div style="font-weight:400;color:var(--muted);font-size:11.5px;margin-top:2px;">${n} comment${n===1?'':'s'} · added ${timeAgo(v.created_at)}</div></span>
      <span class="user-tools">
        <button class="btn small" data-act="viewv" data-vid="${v.id}">Open</button>
        <button class="btn-ghost" data-act="delv" data-vid="${v.id}" data-num="${v.version_number}">Delete</button>
      </span>
    </div>`;
  }).join('') : `<div class="group-empty">No versions.</div>`;
  box.querySelectorAll('[data-act=viewv]').forEach(b=>{
    b.onclick=()=>{ back.remove(); openReview(findUI(uiId).share_token, true, b.getAttribute('data-vid')); };
  });
  box.querySelectorAll('[data-act=delv]').forEach(b=>{
    b.onclick=async()=>{
      const vid=b.getAttribute('data-vid'), num=b.getAttribute('data-num');
      if(vs.length<=1){ toast('This is the only version — delete the UI itself instead.'); return; }
      const n=counts[vid]||0;
      if(!confirm('Delete Version '+num+(n?(' and its '+n+' comment'+(n===1?'':'s')):'')+"? This can't be undone.")) return;
      // best-effort: remove screenshots attached to this version's comments
      const cs=await sb.from('comments').select('images').eq('version_id',vid);
      const paths=[]; (cs.data||[]).forEach(c=>{ try{ (JSON.parse(c.images||'[]')).forEach(im=>{ if(im&&im.path) paths.push(im.path); }); }catch(e){} });
      if(paths.length) sb.storage.from('comment-images').remove(paths).catch(()=>{});
      await sb.from('comments').delete().eq('version_id',vid);
      const del=await sb.from('versions').delete().eq('id',vid);
      if(del.error){ toast('Error: '+del.error.message); return; }
      toast('Version '+num+' deleted');
      await renderDashboard();      // refresh underlying data (DASH)
      drawVersionList(back, uiId);   // refresh this modal
    };
  });
}

async function openReview(tok, isAdmin, initialVid){
  CURRENT.view = isAdmin ? 'review' : 'reviewer';

  const ui=await sb.from('uis').select('*').eq('share_token',tok).single();

  // Light password gate — admins (opened from the dashboard) and already-unlocked
  // devices skip it. This is casual access control only, not real security.
  if(ui.data.is_protected && !isAdmin && !isUnlocked(ui.data)){
    CURRENT.ui=ui.data;

  const vs=await sb.from('versions').select('*').eq('ui_id',ui.data.id).order('version_number',{ascending:true});

    || CURRENT.versions[CURRENT.versions.length-1] || null;
  $('#hdr-title').textContent = ui.data.title;
  renderReviewShell(isAdmin);
  await loadVersion();
  subscribeRealtime();
}

  const input=$('#gate-pw'), err=$('#gate-err');

    const pw=input.value;

// Drag the comments panel's left edge to resize it (clamped; remembered per device).
function wireSideResize(){
  const rez=$('#side-resizer'), side=$('.side'), frame=$('#ui-frame');
  if(!rez||!side) return;
  const MIN=280, maxW=()=>Math.min(760, Math.max(320, window.innerWidth-360));
  const apply=w=>side.style.setProperty('--side-w', Math.min(maxW(), Math.max(MIN, w))+'px');
  const saved=parseInt(localStorage.getItem('uireview_side_w')||'',10);
  if(saved) apply(saved);
  rez.addEventListener('mousedown',e=>{
    e.preventDefault();
    rez.classList.add('dragging');
    document.body.style.userSelect='none'; document.body.style.cursor='col-resize';
    if(frame) frame.style.pointerEvents='none';   // keep mousemove firing while over the iframe
    const move=ev=>{ apply(window.innerWidth-ev.clientX); placePins(); };
    const up=()=>{
      rez.classList.remove('dragging');
      document.body.style.userSelect=''; document.body.style.cursor='';
      if(frame) frame.style.pointerEvents='';
      const cur=parseInt(getComputedStyle(side).width,10); if(cur) localStorage.setItem('uireview_side_w', cur);
      document.removeEventListener('mousemove',move); document.removeEventListener('mouseup',up);
      placePins();
    };
    document.addEventListener('mousemove',move); document.addEventListener('mouseup',up);
  });
}

function switchVersion(vid){

function anchorDesc(c){

function exportForClaude(){
  if(!CURRENT.version){ toast('Nothing to export'); return; }
  const tops=topLevel();
  const open=tops.filter(c=>!c.done), done=tops.filter(c=>c.done);
  const L=[];
  L.push('# UI Review — '+CURRENT.ui.title);
  L.push('Version '+CURRENT.version.version_number+'  ·  exported '+new Date().toLocaleString());
  L.push('');
  L.push(tops.length+' comment(s): '+open.length+' open, '+done.length+' done.');
  L.push('');
  L.push('## Instructions for Claude Code');
  L.push('Implement the OPEN change requests below against this UI. Each item notes where in the UI it applies (selected text, a pinned spot, or a general note) and includes any reply thread. Ask clarifying questions wherever a request is ambiguous or could be done more than one way. Items marked DONE are already handled — skip them unless referenced.');
  L.push('');
  L.push('---');
  const block=(c,idx)=>{
    const out=[];
    out.push('');
    out.push('### '+idx+'. ['+(c.done?'DONE':'OPEN')+'] — '+c.author);
    out.push('- **Where:** '+anchorDesc(c));
    out.push('- **Request:** '+String(c.body).replace(/\n/g,'\n  '));
    const reps=repliesOf(c.id);
    if(reps.length){
      out.push('- **Thread:**');
      reps.forEach(r=>out.push('  - '+r.author+': '+String(r.body).replace(/\n/g,' ')));
    }
    return out.join('\n');
  };
  L.push('');
  L.push('## Open change requests');
  L.push(open.length ? open.map((c,i)=>block(c,i+1)).join('\n') : '\n_(none)_');
  L.push('');
  L.push('## Resolved (for reference)');
  L.push(done.length ? done.map((c,i)=>block(c,i+1)).join('\n') : '\n_(none)_');
  const md=L.join('\n');
  const safe=(CURRENT.ui.title||'ui').replace(/[^\w-]+/g,'_').slice(0,40);
  const fname=safe+'_v'+CURRENT.version.version_number+'_review.md';
  const blob=new Blob([md],{type:'text/markdown'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob); a.download=fname;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(a.href),2000);
  toast('Exported '+fname);
}

/* ---------- JSX → renderable document ---------- */
const GLOBALS = {
  'react':'React','react-dom':'ReactDOM','recharts':'Recharts',
  'lucide-react':'(window.LucideReact||window.lucideReact||{})',
  'lodash':'_','d3':'d3'
};
function transformImports(code){
  let out=code;
  // side-effect imports  import 'x';
  out=out.replace(/^\s*import\s+['"][^'"]+['"];?\s*$/mg,'');
  // import * as NS from 'mod'
  out=out.replace(/import\s+\*\s+as\s+(\w+)\s+from\s*['"]([^'"]+)['"];?/g,(m,ns,mod)=>{
    const g=GLOBALS[mod]; return g?`const ${ns} = ${g};`:`const ${ns} = {};`;
  });
  // import Def, { named } from 'mod'
  out=out.replace(/import\s+(\w+)\s*,\s*\{([^}]*)\}\s*from\s*['"]([^'"]+)['"];?/g,(m,def,named,mod)=>{
    const g=GLOBALS[mod]||'{}'; let s='';
    if(!(mod==='react')) s+=`const ${def} = (${g}&&${g}.default)?${g}.default:${g};`;
    s+=`const {${cleanNamed(named)}} = ${g};`; return s;
  });
  // import Def from 'mod'
  out=out.replace(/import\s+(\w+)\s+from\s*['"]([^'"]+)['"];?/g,(m,def,mod)=>{
    if(mod==='react'||mod==='react-dom') return ''; // React/ReactDOM already global
    const g=GLOBALS[mod]||'{}'; return `const ${def} = (${g}&&${g}.default)?${g}.default:${g};`;
  });
  // import { named } from 'mod'
  out=out.replace(/import\s*\{([^}]*)\}\s*from\s*['"]([^'"]+)['"];?/g,(m,named,mod)=>{
    const g=GLOBALS[mod]||'{}'; return `const {${cleanNamed(named)}} = ${g};`;
  });
  // export default  ->  window.__App =
  out=out.replace(/export\s+default\s+/,'window.__App = ');
  // strip any stray named exports
  out=out.replace(/export\s+(const|function|class|let|var)\s+/g,'$1 ');
  return out;
}
function cleanNamed(s){
  return s.split(',').map(x=>x.trim()).filter(Boolean)
    .map(x=>x.replace(/\s+as\s+/,':')).join(', ');
}

function buildDoc(source, type){
  if(type==='jsx'){
    const code=transformImports(source);
    const parts=[];
    parts.push('<!DOCTYPE html><html><head><meta charset="utf-8">');
    parts.push('<script src="https://unpkg.com/react@18/umd/react.production.min.js"><\/script>');
    parts.push('<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"><\/script>');
    parts.push('<script src="https://unpkg.com/@babel/standalone/babel.min.js"><\/script>');
    parts.push('<script src="https://cdn.tailwindcss.com"><\/script>');
    parts.push('<script src="https://unpkg.com/recharts/umd/Recharts.min.js"><\/script>');
    parts.push('<script src="https://unpkg.com/lodash/lodash.min.js"><\/script>');
    parts.push('<script src="https://unpkg.com/lucide-react@latest/dist/umd/lucide-react.js"><\/script>');
    parts.push('<style>body{margin:0;font-family:system-ui,sans-serif;}#err{padding:22px;color:#b00020;font:13px/1.6 ui-monospace,Menlo,monospace;white-space:pre-wrap;}</style>');
    parts.push('</head><body><div id="approot"></div><div id="err"></div>');
    parts.push('<script type="text/babel" data-presets="react">');
    parts.push('window.onerror=function(m){document.getElementById("err").textContent="Render error: "+m+"\\n\\nThis component may use a library the preview can\'t load. Converting it to HTML before uploading is the reliable path.";};');
    parts.push('try{');
    parts.push(code);
    parts.push('\n;const _R=window.__App;');
    parts.push('if(!_R){throw new Error("No default export / component found.");}');
    parts.push('ReactDOM.createRoot(document.getElementById("approot")).render(React.createElement(_R));');
    parts.push('}catch(e){document.getElementById("err").textContent="Render error: "+(e&&e.message?e.message:e);}');
    parts.push('<\/script></body></html>');
    return parts.join('\n');
  }
  // html
  const s=source.trim();
  if(/^<!doctype/i.test(s)||/^<html[\s>]/i.test(s)) return source;
  return '<!DOCTYPE html><html><head><meta charset="utf-8"><script src="https://cdn.tailwindcss.com"><\/script><style>body{margin:0;font-family:system-ui,sans-serif;}</style></head><body>'+source+'</body></html>';
}

/* ---------- load a version into the frame ---------- */
let _resizeObs=null, _mutObs=null;
async function loadVersion(){
  ACTIVE_CMT=null; PIN_ARMED=false;
  const frame=$('#ui-frame');
  if(!CURRENT.version){ frame.srcdoc='<body style="font-family:system-ui;padding:30px;color:#666">No version to show.</body>'; return; }
  frame.srcdoc = buildDoc(CURRENT.version.source, CURRENT.version.render_type);
  frame.onload=()=>{ suppressBenignErrors(frame); interceptLinks(frame); sizeFrame(); wireSelection(); };
  await loadComments();
}
// Links inside a srcdoc UI resolve relative to THIS app's URL, so clicking one
// would navigate the preview frame into the app itself (showing dashboard bits).
// Keep every link from navigating the frame: in-page #anchors scroll within the
// preview; anything else opens in a new tab.
function interceptLinks(frame){
  let doc; try{ doc=frame.contentDocument; }catch(e){ return; }
  doc.addEventListener('click', function(e){
    const a = e.target && e.target.closest ? e.target.closest('a[href]') : null;
    if(!a) return;
    const raw = a.getAttribute('href') || '';
    if(raw.charAt(0)==='#'){
      e.preventDefault();                       // never resolve '#...' against the parent app URL
      const id = raw.slice(1);
      if(id){ let t=null; try{ t=doc.getElementById(id)||doc.querySelector('[name="'+cssEscape(id)+'"]'); }catch(_){}
        if(t) t.scrollIntoView({behavior:'smooth', block:'start'}); }
      return;
    }
    e.preventDefault();                          // external/relative link → new tab, not the review frame
    if(a.href){ try{ window.open(a.href,'_blank','noopener'); }catch(_){} }
  }, true);
}
// Some UIs (and my own resize logic) can emit the harmless
// "ResizeObserver loop completed with undelivered notifications" message.
// Swallow it so an embedded UI's error banner doesn't misreport it as a crash.
function suppressBenignErrors(frame){
  try{
    frame.contentWindow.addEventListener('error', function(ev){
      if(ev && ev.message && ev.message.indexOf('ResizeObserver loop')>=0){
        ev.stopImmediatePropagation(); ev.preventDefault();
      }
    }, true);
  }catch(e){}
}
function sizeFrame(){
  const frame=$('#ui-frame');
  try{
    const doc=frame.contentDocument;
    let raf=null, last=0;
    const fit=()=>{
      const h=Math.max(doc.body.scrollHeight, doc.documentElement.scrollHeight, 400);
      if(Math.abs(h-last)>1){ last=h; frame.style.height=h+'px'; }  // only change when needed → no RO loop
      placePins();
    };
    const schedule=()=>{ if(raf) return; raf=requestAnimationFrame(()=>{ raf=null; fit(); }); };
    schedule();
    // JSX/React mounts async — refit a few times, then rely on the observer.
    let n=0; const iv=setInterval(()=>{ schedule(); if(++n>10) clearInterval(iv); },300);
    if(_resizeObs) _resizeObs.disconnect();
    _resizeObs=new ResizeObserver(schedule); _resizeObs.observe(doc.body);
    // Reposition pins when the (dynamic) UI shows/hides/moves things — dropdowns,
    // toggled sections, etc. — even when the overall height doesn't change.
    if(_mutObs) _mutObs.disconnect();
    _mutObs=new MutationObserver(schedule);
    _mutObs.observe(doc.body,{childList:true,subtree:true,attributes:true,attributeFilter:['style','class','hidden','open','aria-hidden','aria-expanded']});
  }catch(e){ frame.style.height='700px'; }
}

/* ---------- comments data ---------- */
async function loadComments(){
  if(!CURRENT.version){ CURRENT.comments=[]; renderComments(); return; }
  const c=await sb.from('comments').select('*').eq('version_id',CURRENT.version.id).order('created_at',{ascending:true});
  CURRENT.comments=c.data||[];
  refreshAuthorFilter();
  renderComments(); placePins();
}
function topLevel(){ return CURRENT.comments.filter(c=>!c.parent_id); }
function repliesOf(id){ return CURRENT.comments.filter(c=>c.parent_id===id); }
function numberOf(id){ return topLevel().findIndex(c=>c.id===id)+1; }

function passesFilter(c){
  if(FILTER.status==='open'&&c.done) return false;
  if(FILTER.status==='done'&&!c.done) return false;
  if(FILTER.author!=='all'&&c.author!==FILTER.author) return false;
  return true;
}
function refreshAuthorFilter(){
  const sel=$('#author-filter'); if(!sel) return;
  const names=[...new Set(CURRENT.comments.map(c=>c.author))].sort();
  const cur=FILTER.author;
  sel.innerHTML=`<option value="all">Everyone</option>`+names.map(n=>`<option value="${esc(n)}" ${n===cur?'selected':''}>${esc(n)}</option>`).join('');
}
function setFilter(k,v,btn){

/* ---------- element-anchored pins on overlay ----------
   Each located comment stores, in its anchor JSON, a descriptor of the actual
   iframe element it was placed on (plus an offset within it) AND a plain x/y
   fraction as a fallback. On every layout/DOM change we re-resolve the element
   and move the pin onto it, so pins follow the dynamic UI — and hide when their
   element isn't currently on screen. Old comments (fraction only) still work. */
function cssEscape(s){ return (window.CSS&&CSS.escape)?CSS.escape(s):String(s).replace(/[^\w-]/g,'\\$&'); }

// Build a re-resolvable descriptor for an element inside the iframe.
function describeEl(el, doc){
  if(!el || el.nodeType!==1 || el===doc.body || el===doc.documentElement) return null;
  const parts=[]; let n=el;
  while(n && n.nodeType===1 && n!==doc.body && parts.length<12){
    if(n.id){ parts.unshift('#'+cssEscape(n.id)); break; }   // an id makes the path stable — stop here
    let seg=n.tagName.toLowerCase();
    const par=n.parentNode;
    if(par){
      const sibs=[...par.children].filter(c=>c.tagName===n.tagName);
      if(sibs.length>1) seg+=':nth-of-type('+(sibs.indexOf(n)+1)+')';
    }
    parts.unshift(seg); n=n.parentNode;
  }
  const text=(el.textContent||'').trim().replace(/\s+/g,' ').slice(0,80);
  return { path:parts.join('>'), tag:el.tagName.toLowerCase(), id:el.id||'', text };
}

// Re-find the element for a descriptor in the current iframe DOM (best-effort).
function resolveDesc(desc, doc){
  if(!desc) return null;
  if(desc.id){ try{ const e=doc.getElementById(desc.id); if(e) return e; }catch(_){} }
  if(desc.path){ try{ const e=doc.querySelector(desc.path); if(e) return e; }catch(_){} }
  if(desc.text && desc.tag){ try{                            // survives re-renders that shuffle structure
    const hit=[...doc.getElementsByTagName(desc.tag)]
      .find(e=>(e.textContent||'').trim().replace(/\s+/g,' ').indexOf(desc.text)>=0);
    if(hit) return hit;
  }catch(_){} }
  return null;
}

function elVisible(el, doc){
  if(!el) return false;
  const cs=doc.defaultView.getComputedStyle(el);
  if(cs.display==='none'||cs.visibility==='hidden') return false;
  if(el.offsetParent===null && cs.position!=='fixed') return false;   // an ancestor is display:none
  const r=el.getBoundingClientRect();
  return r.width>0 || r.height>0;
}

// Where should this comment's pin sit? Returns overlay-relative fractions plus a
// `visible` flag, or null for general (unplaced) comments.
function anchorPoint(c){
  let a; try{ a=JSON.parse(c.anchor||'{}'); }catch(e){ a={}; }
  const frame=$('#ui-frame'); let doc=null;
  try{ doc=frame&&frame.contentDocument; }catch(e){}
  if(a.el && doc){
    const el=resolveDesc(a.el, doc);
    if(el && elVisible(el, doc)){
      const r=el.getBoundingClientRect();
      const W=frame.clientWidth||1, H=frame.clientHeight||1;
      const ox=a.ox==null?0.5:a.ox, oy=a.oy==null?0.5:a.oy;
      return { xFrac:(r.left+ox*r.width)/W, yFrac:(r.top+oy*r.height)/H, visible:true };
    }
    if(a.xFrac!=null) return { xFrac:a.xFrac, yFrac:a.yFrac, visible:false };  // element hidden/gone
    return null;
  }
  if(a.xFrac!=null) return { xFrac:a.xFrac, yFrac:a.yFrac, visible:true };     // v1 fraction anchor
  return null;
}

function placePins(){
  const ov=$('#overlay'); if(!ov) return;
  ov.querySelectorAll('.pin').forEach(p=>p.remove());
  topLevel().forEach(c=>{
    const pt=anchorPoint(c);
    if(!pt) return;                                    // general comment — no pin to place
    if(!pt.visible && c.id!==ACTIVE_CMT) return;       // target hidden → only show when selected
    const pin=document.createElement('div');
    pin.className='pin'+(c.done?' resolved':'')+(ACTIVE_CMT===c.id?' active':'')+(pt.visible?'':' stale');
    pin.id='pin-'+c.id;
    pin.style.left=(pt.xFrac*100)+'%'; pin.style.top=(pt.yFrac*100)+'%';
    pin.textContent=numberOf(c.id);
    if(!pt.visible) pin.title='This element isn’t visible in the current state — showing its last position.';
    pin.onclick=e=>{ e.stopPropagation(); focusComment(c.id, 'pin'); };
    ov.appendChild(pin);
  });
}

function togglePin(){
  PIN_ARMED=!PIN_ARMED;
  const ov=$('#overlay'), btn=$('#pinbtn'), banner=$('#pin-banner');
  ov.classList.toggle('arming',PIN_ARMED);
  btn.classList.toggle('on',PIN_ARMED);
  btn.textContent = PIN_ARMED ? '✕ Cancel pin' : '📍 Drop a comment pin';
  if(banner) banner.classList.toggle('show',PIN_ARMED);
  clearSelBtn();
}
document.addEventListener('keydown',e=>{ if(e.key==='Escape'&&PIN_ARMED) togglePin(); });
document.addEventListener('click',e=>{
  const ov=$('#overlay'); if(!ov||!PIN_ARMED) return;
  if(e.target!==ov) return;
  const rect=ov.getBoundingClientRect();
  const px=e.clientX-rect.left, py=e.clientY-rect.top;
  const anchor={ xFrac:px/rect.width, yFrac:py/rect.height };
  // Tie the pin to the actual element under the click so it tracks the (dynamic) UI.
  try{
    const doc=$('#ui-frame').contentDocument;
    const el=doc.elementFromPoint(px, py);       // px,py are iframe-viewport coords (frame isn't scrolled)
    const desc=describeEl(el, doc);
    if(desc){
      const r=el.getBoundingClientRect();
      anchor.el=desc;
      anchor.ox=r.width?(px-r.left)/r.width:0.5;
      anchor.oy=r.height?(py-r.top)/r.height:0.5;
    }
  }catch(_){}
  PENDING_ANCHOR=anchor;
  togglePin();
  openComposerFor(PENDING_ANCHOR, null);
});

/* ---------- text selection commenting ---------- */
let _selBtn=null;
function clearSelBtn(){ if(_selBtn){ _selBtn.remove(); _selBtn=null; } }
function wireSelection(){
  const frame=$('#ui-frame'); let doc;
  try{ doc=frame.contentDocument; }catch(e){ return; }
  doc.addEventListener('mouseup',()=>{
    setTimeout(()=>{
      let sel; try{ sel=doc.getSelection(); }catch(e){ return; }
      clearSelBtn();
      if(!sel||sel.isCollapsed||!sel.toString().trim()) return;
      const range=sel.getRangeAt(0); const rr=range.getBoundingClientRect();
      const fr=frame.getBoundingClientRect();
      const ov=$('#overlay');
      // rr is already in the iframe's own coordinate space; the overlay covers the
      // iframe 1:1, so these map straight onto overlay-local coordinates.
      const cx=rr.left+rr.width/2, cy=rr.top+rr.height/2;
      const xFrac=cx/fr.width, yFrac=cy/fr.height;
      const quote=sel.toString().trim().slice(0,180);
      const anchor={xFrac,yFrac,quote};
      // Anchor to the element containing the selection so the pin tracks it.
      let cont=range.commonAncestorContainer;
      if(cont && cont.nodeType!==1) cont=cont.parentElement;
      const desc=describeEl(cont, doc);
      if(desc){
        desc.text=quote.slice(0,80);                 // the quote re-finds it best after re-renders
        const cr=cont.getBoundingClientRect();
        anchor.el=desc;
        anchor.ox=cr.width?(cx-cr.left)/cr.width:0.5;
        anchor.oy=cr.height?(cy-cr.top)/cr.height:0.5;
      }
      _selBtn=document.createElement('button');
      _selBtn.className='sel-btn'; _selBtn.textContent='💬 Comment on selection';
      _selBtn.style.left=cx+'px'; _selBtn.style.top=rr.top+'px';
      _selBtn.onclick=()=>{ clearSelBtn(); openComposerFor(anchor, null); };
      ov.appendChild(_selBtn);
    },10);
  });
}

/* ---------- screenshot attachments (Supabase Storage) ----------
   Images live in the public 'comment-images' bucket; the comment row stores
   only a small JSON array of {url, path}. They upload as soon as you add them,
   then post with the comment. Reviewers see inline thumbnails (click = lightbox). */
async function uploadImage(file){
  const ext=((file.name||'').match(/\.(\w+)$/)||[,'png'])[1].toLowerCase();
  const path=token()+'.'+ext;
  const up=await sb.storage.from('comment-images').upload(path, file, {contentType:file.type||'image/png', upsert:false});
  if(up.error) throw up.error;
  return { url: sb.storage.from('comment-images').getPublicUrl(path).data.publicUrl, path };
}
function imgErr(e){
  const m=(e&&e.message)||String(e);
  if(/bucket/i.test(m)) return 'Screenshots need a quick storage setup first — run the image SQL, then reload.';
  return 'Image upload failed: '+m;
}
// Add paste / drag-drop / file-picker image attaching to a composer. Returns
// { get() } → the array of uploaded {url,path} to save with the comment.
function wireAttachments(composerEl, ta){
  const list=[];
  const strip=document.createElement('div'); strip.className='att-strip';
  ta.insertAdjacentElement('afterend', strip);
  const input=document.createElement('input'); input.type='file'; input.accept='image/*'; input.multiple=true; input.style.display='none';
  const addBtn=document.createElement('button'); addBtn.type='button'; addBtn.className='btn-ghost att-add'; addBtn.textContent='📎 Add image';
  const row=composerEl.querySelector('.row');
  if(row){ row.appendChild(addBtn); row.appendChild(input); } else { strip.insertAdjacentElement('afterend', addBtn); addBtn.insertAdjacentElement('afterend', input); }
  async function handleFiles(files){
    for(const f of files){
      if(!f || !f.type || !f.type.startsWith('image/')) continue;
      const t=document.createElement('div'); t.className='att-thumb';
      t.innerHTML='<span class="att-spin"></span>';
      strip.appendChild(t);
      try{
        const rec=await uploadImage(f);
        list.push(rec);
        t.innerHTML='';
        const img=document.createElement('img'); img.src=rec.url; img.alt='screenshot'; t.appendChild(img);
        const x=document.createElement('button'); x.type='button'; x.className='att-x'; x.textContent='×'; x.title='Remove';
        x.onclick=()=>{ const i=list.indexOf(rec); if(i>=0) list.splice(i,1); t.remove(); sb.storage.from('comment-images').remove([rec.path]).catch(()=>{}); };
        t.appendChild(x);
      }catch(err){ t.remove(); toast(imgErr(err)); }
    }
  }
  addBtn.onclick=()=>input.click();
  input.onchange=()=>{ handleFiles([...input.files]); input.value=''; };
  ta.addEventListener('paste',e=>{
    const imgs=[...((e.clipboardData&&e.clipboardData.items)||[])].filter(it=>it.type&&it.type.startsWith('image/'));
    if(imgs.length){ e.preventDefault(); handleFiles(imgs.map(it=>it.getAsFile())); }
  });
  ['dragenter','dragover'].forEach(ev=>composerEl.addEventListener(ev,e=>{ e.preventDefault(); composerEl.classList.add('drop-hot'); }));
  ['dragleave','drop'].forEach(ev=>composerEl.addEventListener(ev,e=>{ e.preventDefault(); composerEl.classList.remove('drop-hot'); }));
  composerEl.addEventListener('drop',e=>{ const fs=[...((e.dataTransfer&&e.dataTransfer.files)||[])]; if(fs.length) handleFiles(fs); });
  return { get:()=>list.map(r=>({url:r.url, path:r.path})) };
}

/* ---------- comment composer (new top-level) ---------- */
function ctrlEnter(ta, btn){
  ta.addEventListener('keydown', e=>{
    if((e.ctrlKey||e.metaKey) && (e.key==='Enter'||e.keyCode===13)){ e.preventDefault(); btn.click(); }
  });
}
function openComposerFor(anchor, _){
  ensureName(name=>{
    // temporary composer card at top of list
    renderComments();
    const box=$('#comments');
    const card=document.createElement('div'); card.className='cmt';
    card.innerHTML=`
      <div class="cmt-top"><span class="cmt-num">•</span><span class="cmt-who">${esc(name)}</span></div>
      ${anchor.quote?`<div class="cmt-quote">${esc(anchor.quote)}</div>`:''}
      <div class="composer">
        <textarea placeholder="Describe the change or question…  (Ctrl/⌘+Enter to post · paste or drop a screenshot)" autofocus></textarea>
        <div class="row">
          <button class="btn small" id="c-save">Post comment</button>
          <button class="btn-ghost" id="c-cancel">Cancel</button>
        </div>
      </div>`;
    box.prepend(card);
    const ta=card.querySelector('textarea'); ta.focus();
    card.querySelector('#c-cancel').onclick=()=>renderComments();
    const att=wireAttachments(card.querySelector('.composer'), ta);
    const saveBtn=card.querySelector('#c-save');
    saveBtn.onclick=async()=>{
      const body=ta.value.trim(); if(!body){ toast('Write a comment first'); return; }
      const imgs=att.get();
      const ins=await sb.from('comments').insert({
        version_id:CURRENT.version.id, author:name, body,
        anchor:JSON.stringify(anchor), done:false, parent_id:null,
        images: imgs.length?JSON.stringify(imgs):null
      });
      if(ins.error){ toast('Error: '+ins.error.message); return; }
      await loadComments();
    };
    ctrlEnter(ta, saveBtn);
  });
}

/* ---------- render comments sidebar ---------- */
function renderComments(){
  const box=$('#comments'); if(!box) return;
  const tops=topLevel().filter(passesFilter);
  if(!tops.length){
    const any=topLevel().length;
    box.innerHTML=`<div class="side-empty">${any?'No comments match this filter.':'No comments yet.<br>Select text or drop a pin on the UI to add the first one.'}</div>`;
    placePins(); return;
  }
  box.innerHTML = tops.map(c=>commentCardHTML(c)).join('');
  placePins();
}
// Admins (opened the review from the dashboard) may moderate — i.e. delete
// anyone's comments. Reviewers on a share link can only touch their own. This
// is a UI-level privilege only, matching the app's other client-side gates.
function isAdminView(){ return CURRENT.view==='review'; }

function commentCardHTML(c){
  const mine = c.author===myName();
  const reps = repliesOf(c.id);
  return `<div class="cmt ${c.done?'resolved':''} ${ACTIVE_CMT===c.id?'active':''}" id="cmt-${c.id}" onclick="cardClick(event,'${c.id}')">
    <div class="cmt-top">
      <span class="cmt-num">${numberOf(c.id)}</span>
      <span class="cmt-who">${esc(c.author)}</span>
      <span class="cmt-time">${timeAgo(c.created_at)}</span>
      <label class="cmt-check"><input type="checkbox" ${c.done?'checked':''} onchange="toggleDone('${c.id}',this.checked)">Done</label>
    </div>
    ${anchorQuote(c)}
    <div class="cmt-body" id="body-${c.id}">${esc(c.body)}</div>
    ${commentImages(c)}
    <div class="cmt-tools">
      <button onclick="openReply('${c.id}')">Reply</button>
      ${mine?`<button onclick="startEdit('${c.id}')">Edit</button>`:''}
      ${(mine||isAdminView())?`<button onclick="delComment('${c.id}')">Delete</button>`:''}
    </div>
    ${reps.length?`<div class="replies">${reps.map(r=>replyHTML(r)).join('')}</div>`:''}
    <div id="reply-slot-${c.id}"></div>
  </div>`;
}
function replyHTML(r){
  const mine=r.author===myName();
  return `<div class="reply" id="cmt-${r.id}">
    <div class="cmt-top"><span class="cmt-who">${esc(r.author)}</span><span class="cmt-time">${timeAgo(r.created_at)}</span></div>
    <div class="cmt-body" id="body-${r.id}">${esc(r.body)}</div>
    ${commentImages(r)}
    ${(mine||isAdminView())?`<div class="cmt-tools">${mine?`<button onclick="startEdit('${r.id}')">Edit</button>`:''}<button onclick="delComment('${r.id}')">Delete</button></div>`:''}
  </div>`;
}
function anchorQuote(c){
  let a; try{ a=JSON.parse(c.anchor||'{}'); }catch(e){ a={}; }
  return a.quote?`<div class="cmt-quote">${esc(a.quote)}</div>`:'';
}
function commentImages(c){
  let arr; try{ arr=JSON.parse(c.images||'[]'); }catch(e){ arr=[]; }
  if(!Array.isArray(arr)||!arr.length) return '';
  return `<div class="cmt-imgs">`+arr.map(im=>`<img class="cmt-img" src="${esc(im.url)}" alt="screenshot" loading="lazy" onclick="event.stopPropagation();openLightbox(this.src)">`).join('')+`</div>`;
}
function openLightbox(url){
  const b=document.createElement('div'); b.className='lightbox';
  const img=document.createElement('img'); img.src=url;
  const x=document.createElement('button'); x.className='lb-x'; x.textContent='×'; x.title='Close';
  b.appendChild(img); b.appendChild(x);
  const close=()=>{ b.remove(); document.removeEventListener('keydown', onKey); };
  function onKey(e){ if(e.key==='Escape') close(); }
  b.addEventListener('click', close);
  document.addEventListener('keydown', onKey);
  document.body.appendChild(b);
}

function cardClick(e, id){
  // ignore clicks on interactive controls inside the card
  if(e.target.closest('button, input, textarea, select, label, .composer')) return;
  focusComment(id, 'card');
}

function focusComment(id, from){
  ACTIVE_CMT=id;
  renderComments();               // re-highlights active card + repaints pins
  // scroll the sidebar to the comment card
  const card=$('#cmt-'+id);
  if(card) card.scrollIntoView({behavior:'smooth', block:'center'});
  // scroll the canvas to the pin and pulse it
  const pin=$('#pin-'+id);
  if(pin){
    pin.scrollIntoView({behavior:'smooth', block:'center'});
    pin.classList.remove('pulse'); void pin.offsetWidth; pin.classList.add('pulse');
    if(pin.classList.contains('stale')) toast('The element this comment was placed on isn’t visible right now — showing its last position.');
  } else if(from==='card'){
    toast('This comment isn’t placed on the current version.');
  }
}

/* ---------- replies / edit / delete / done ---------- */
function openReply(parentId){
  ensureName(name=>{
    const slot=$('#reply-slot-'+parentId); if(!slot) return;
    slot.innerHTML=`<div class="composer" style="margin-top:9px">
      <textarea placeholder="Reply…  (paste or drop a screenshot)"></textarea>
      <div class="row"><button class="btn small" id="r-save">Reply</button><button class="btn-ghost" id="r-cancel">Cancel</button></div>
    </div>`;
    const ta=slot.querySelector('textarea'); ta.focus();
    slot.querySelector('#r-cancel').onclick=()=>slot.innerHTML='';
    const att=wireAttachments(slot.querySelector('.composer'), ta);
    const rSave=slot.querySelector('#r-save');
    rSave.onclick=async()=>{
      const body=ta.value.trim(); if(!body) return;
      const imgs=att.get();
      const ins=await sb.from('comments').insert({version_id:CURRENT.version.id, author:name, body, parent_id:parentId, done:false, anchor:null, images: imgs.length?JSON.stringify(imgs):null});
      if(ins.error){ toast('Error: '+ins.error.message); return; }
      await loadComments();
    };
    ctrlEnter(ta, rSave);
  });
}
async function toggleDone(id, done){
  const up=await sb.from('comments').update({done}).eq('id',id);
  if(up.error){ toast('Error: '+up.error.message); return; }
  await loadComments();
}
function startEdit(id){
  const c=CURRENT.comments.find(x=>x.id===id); if(!c) return;
  const bodyEl=$('#body-'+id); if(!bodyEl) return;
  bodyEl.innerHTML=`<div class="composer"><textarea>${esc(c.body)}</textarea>
    <div class="row"><button class="btn small" id="e-save">Save</button><button class="btn-ghost" id="e-cancel">Cancel</button></div></div>`;
  const ta=bodyEl.querySelector('textarea'); ta.focus();
  bodyEl.querySelector('#e-cancel').onclick=()=>renderComments();
  const eSave=bodyEl.querySelector('#e-save');
  eSave.onclick=async()=>{
    const body=ta.value.trim(); if(!body) return;
    const up=await sb.from('comments').update({body}).eq('id',id);
    if(up.error){ toast('Error: '+up.error.message); return; }
    await loadComments();
  };
  ctrlEnter(ta, eSave);
}
async function delComment(id){
  if(!confirm('Delete this comment? Replies to it will also be removed.')) return;
  // Best-effort: remove any attached screenshots (this comment + its replies) from storage.
  const paths=[];
  CURRENT.comments.filter(x=>x.id===id||x.parent_id===id).forEach(v=>{
    try{ (JSON.parse(v.images||'[]')).forEach(im=>{ if(im&&im.path) paths.push(im.path); }); }catch(e){}
  });
  if(paths.length) sb.storage.from('comment-images').remove(paths).catch(()=>{});
  await sb.from('comments').delete().eq('parent_id',id);
  const del=await sb.from('comments').delete().eq('id',id);
  if(del.error){ toast('Error: '+del.error.message); return; }
  if(ACTIVE_CMT===id) ACTIVE_CMT=null;
  await loadComments();
}

/* ---------- realtime ---------- */
function cleanupChannel(){ if(CURRENT.channel){ sb.removeChannel(CURRENT.channel); CURRENT.channel=null; } }
function subscribeRealtime(){
  cleanupChannel();
  if(!CURRENT.version) return;
  CURRENT.channel = sb.channel('cmts-'+CURRENT.version.id)
    .on('postgres_changes',{event:'*',schema:'public',table:'comments',filter:'version_id=eq.'+CURRENT.version.id},
      ()=>loadComments())
    .subscribe();
}

window.addEventListener('resize',()=>placePins());
boot();
</script>
</body>
</html>
